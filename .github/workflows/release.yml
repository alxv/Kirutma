name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: apps/desktop
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest'
        working-directory: .
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not set — Mac build will be unsigned."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1)
          if [ -z "$CERT_INFO" ]; then
            echo "No Developer ID Application certificate found in imported keychain."
            exit 1
          fi
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Imported signing identity: $CERT_ID"

      - name: Import Windows code signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        working-directory: .
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE not set — Windows build will be unsigned."
            exit 0
          }
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate `
            -FilePath certificate/certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText) | Out-Null
          Write-Host "Windows certificate imported."

      - name: Configure Windows signing in Tauri config
        if: matrix.platform == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        run: |
          if [ -z "$WINDOWS_CERTIFICATE_THUMBPRINT" ]; then
            echo "WINDOWS_CERTIFICATE_THUMBPRINT not set — skipping Windows signing config."
            exit 0
          fi
          node <<'EOF'
          const fs = require("fs");
          const path = "src-tauri/tauri.conf.json";
          const config = JSON.parse(fs.readFileSync(path, "utf8"));
          config.bundle.windows = {
            ...(config.bundle.windows || {}),
            certificateThumbprint: process.env.WINDOWS_CERTIFICATE_THUMBPRINT,
            digestAlgorithm: "sha256",
            timestampUrl: "http://timestamp.digicert.com",
          };
          fs.writeFileSync(path, JSON.stringify(config, null, 2) + "\n");
          EOF

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: Kirutma v__VERSION__
          releaseBody: |
            ## Kirutma v__VERSION__

            Desktop design tool with an infinite canvas, layers, styles, components, and PNG/SVG export.

            ### Downloads

            | Platform | File |
            |----------|------|
            | **Mac (Apple Silicon)** | `.dmg` with `aarch64` in the name |
            | **Mac (Intel)** | `.dmg` with `x64` or `x86_64` in the name |
            | **Windows** | `.msi` and/or `.exe` (NSIS) |

            ### Install

            - **Mac:** Open the DMG, drag Kirutma to Applications, then launch.
            - **Windows:** Run the MSI or setup EXE, then launch from the Start menu.

            User manual: https://github.com/${{ github.repository }}/blob/v__VERSION__/USER_MANUAL.md

            Download: https://github.com/alxv/Kirutma/releases/latest
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
